# ============================================================
#  Auth Platform — Nginx Reverse Proxy (Production)
# ============================================================
#
#  Architecture:
#    Internet → Cloudflare Tunnel → Nginx:80 → Gunicorn:8000
#
#  Nginx handles:
#    - Gzip compression
#    - Security headers (HSTS, XSS, Content-Type sniffing)
#    - Rate limiting per endpoint tier
#    - Reverse proxy to Gunicorn + Uvicorn workers
#    - SSE (Server-Sent Events) support for /token/session-stream
#    - Request buffering / connection management
# ============================================================

worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Rate Limiting Zones ──
    # General API: 10 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    # Auth endpoints: 5 req/sec per IP (stricter)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    # Token endpoint: 3 req/sec per IP (strictest)
    limit_req_zone $binary_remote_addr zone=api_token:10m rate=3r/s;

    # ── Upstream: Gunicorn Backend ──
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS — Cloudflare handles TLS, but this protects direct access
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Health Check (Nginx itself) ──
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"nginx_ok"}';
            add_header Content-Type application/json;
        }

        # ── Static Assets — Cache aggressively (images, fonts, etc.) ──
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Cache static assets for 7 days
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── CSS/JS — Cache for 1 day ──
        location ~* \.(css|js)$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            expires 1d;
            add_header Cache-Control "public";
        }

        # ── SSE Stream — Special proxy settings (no buffering) ──
        location /token/session-stream {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE-specific: disable ALL buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;   # Keep SSE alive for up to 1 hour
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;

            # Nginx must NOT buffer SSE events
            add_header X-Accel-Buffering "no";
        }

        # ── Auth Endpoints — Stricter rate limit ──
        location /auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── OAuth Endpoints — Stricter rate limit ──
        location /oauth/ {
            limit_req zone=api_auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Token Endpoints — Strictest rate limit ──
        location /token/ {
            limit_req zone=api_token burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Admin API — Stricter rate limit ──
        location /admin/ {
            limit_req zone=api_auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Everything Else → Backend ──
        location / {
            limit_req zone=api_general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Block Hidden Files (.env, .git, etc.) ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
