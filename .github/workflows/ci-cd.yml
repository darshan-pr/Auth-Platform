name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run tests
        run: |
          cd backend
          pytest tests -q

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml -p auth-platform-prod build backend migrations nginx
            docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml -p auth-platform-prod up -d postgres redis
            docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml -p auth-platform-prod run --rm migrations
            docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml -p auth-platform-prod up -d backend nginx
            docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml -p auth-platform-prod ps
