name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run tests
        run: |
          cd backend
          pytest tests -q

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_APP_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: .env file is missing on EC2 at ${{ secrets.EC2_APP_PATH }}/.env"
              exit 1
            fi

            # Ensure we publish nginx on a standard web port unless explicitly overridden.
            # This avoids "deployment succeeded but domain is unreachable" when only :8000 is exposed.
            export NGINX_PORT="${NGINX_PORT:-80}"

            COMPOSE_FILES="-f docker-compose.prod.yml"
            if [ -f docker-compose.ssl.yml ]; then
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.ssl.yml"
            fi

            docker compose $COMPOSE_FILES -p auth-platform-prod build backend migrations nginx
            docker compose $COMPOSE_FILES -p auth-platform-prod up -d postgres redis
            docker compose $COMPOSE_FILES -p auth-platform-prod run --rm migrations
            docker compose $COMPOSE_FILES -p auth-platform-prod up -d backend nginx
            docker compose $COMPOSE_FILES -p auth-platform-prod ps

            # Fast fail if nginx is not reachable on the expected host port
            curl -fsS "http://127.0.0.1:${NGINX_PORT}/nginx-health"
