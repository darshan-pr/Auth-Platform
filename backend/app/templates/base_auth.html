<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{% block favicon_href %}/assets/logo.png{% endblock %}">
    {% block favicon_script %}{% endblock %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}Auth Platform{% endblock %}</title>
    {% block styles %}{% endblock %}
    {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}mode-login{% endblock %}">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
